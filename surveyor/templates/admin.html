<!DOCTYPE html>
<html lang="en" x-data="admin()" x-init="init()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — AI Agents Surveyor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root {
      --c-bg:     #0f172a;
      --c-card:   #1e293b;
      --c-border: #334155;
      --c-text:   #f1f5f9;
      --c-muted:  #94a3b8;
    }
    body { background: var(--c-bg); color: var(--c-text); font-family: system-ui, sans-serif; margin: 0; }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.375rem;
      background: #6366f1; color: #fff;
      padding: 0.5rem 1.25rem; border-radius: 0.75rem;
      font-size: 0.875rem; font-weight: 500; cursor: pointer;
      border: none; transition: background 0.15s;
    }
    .btn-primary:hover:not(:disabled) { background: #4f46e5; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 0.375rem;
      background: transparent; color: var(--c-muted);
      padding: 0.5rem 1rem; border-radius: 0.75rem;
      font-size: 0.875rem; font-weight: 500; cursor: pointer;
      border: 1px solid var(--c-border); transition: color 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover { color: var(--c-text); border-color: #64748b; }

    /* ── Entry list ── */
    .entry-list {
      border: 1px solid var(--c-border); border-radius: 0.75rem;
      overflow: hidden; overflow-y: auto; max-height: 640px;
    }
    .entry-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.55rem 1rem;
      border-bottom: 1px solid var(--c-border);
      transition: background 0.1s;
    }
    .entry-row:last-child { border-bottom: none; }
    .entry-row:hover { background: rgba(255,255,255,0.03); }
    .entry-row.dup {
      background: rgba(239,68,68,0.08);
      border-bottom-color: rgba(239,68,68,0.2);
    }
    .entry-row.dup:hover { background: rgba(239,68,68,0.12); }
    .entry-row.comment { opacity: 0.45; }
    .entry-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .entry-text {
      flex: 1; font-family: 'Menlo','Monaco','Consolas',monospace;
      font-size: 0.82rem; color: #e2e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .entry-row.dup .entry-text { color: #fca5a5; }
    .entry-row.comment .entry-text { color: var(--c-muted); font-style: italic; }
    .entry-remove {
      background: none; border: none; cursor: pointer; color: #475569;
      font-size: 1rem; line-height: 1; padding: 0 0.2rem;
      transition: color 0.1s; flex-shrink: 0;
    }
    .entry-remove:hover { color: #ef4444; }
    .dup-badge {
      font-size: 0.65rem; font-weight: 600; padding: 0.1rem 0.4rem;
      border-radius: 9999px; border: 1px solid rgba(239,68,68,0.5);
      color: #fca5a5; flex-shrink: 0; white-space: nowrap;
    }
    /* Add row */
    .add-row {
      display: flex; gap: 0.5rem; align-items: center;
      padding: 0.6rem 1rem; background: rgba(99,102,241,0.05);
      border-top: 1px solid var(--c-border);
    }
    .add-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: 'Menlo','Monaco','Consolas',monospace;
      font-size: 0.82rem; color: #e2e8f0; caret-color: #e2e8f0;
    }
    .add-input::placeholder { color: #475569; }

    /* Raw textarea */
    .raw-textarea {
      display: block; width: 100%; box-sizing: border-box;
      background: #0b1120; color: #e2e8f0; caret-color: #e2e8f0;
      border: 1px solid var(--c-border); border-radius: 0.75rem;
      padding: 1.25rem 1.5rem; outline: none; resize: vertical;
      font-family: 'Menlo','Monaco','Consolas',monospace;
      font-size: 0.82rem; line-height: 2; transition: border-color 0.15s;
    }
    .raw-textarea:focus { border-color: #6366f1; }

    .card { background: var(--c-card); border: 1px solid var(--c-border); border-radius: 0.75rem; padding: 1.5rem; }

    .tab-btn {
      padding: 0.3rem 0.75rem; border: none; cursor: pointer;
      font-size: 0.75rem; font-weight: 500;
      background: transparent; color: var(--c-muted);
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active { background: #6366f1; color: #fff; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; display: inline-block; }

    /* ── Git sync ── */
    .git-file-list {
      max-height: 160px; overflow-y: auto;
      margin: 0.5rem 0;
    }
    .git-file-item {
      font-family: 'Menlo','Monaco','Consolas',monospace;
      font-size: 0.72rem; color: #94a3b8;
      padding: 0.2rem 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .git-file-item .git-status-char {
      color: #f59e0b; margin-right: 0.4rem; font-weight: 600;
    }
    .git-badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.75rem; font-weight: 500; padding: 0.3rem 0.6rem;
      border-radius: 0.5rem; margin-top: 0.5rem;
    }
    .git-badge-pending  { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.35); color: #fcd34d; }
    .git-badge-open     { background: rgba(99,102,241,0.1);  border: 1px solid rgba(99,102,241,0.35); color: #a5b4fc; }
    .git-badge-merged   { background: rgba(34,197,94,0.1);   border: 1px solid rgba(34,197,94,0.35);  color: #86efac; }
    .git-badge-ok       { background: rgba(34,197,94,0.08);  border: 1px solid rgba(34,197,94,0.2);   color: #4ade80; }
  </style>
</head>
<body class="min-h-screen">

<!-- ── NAV ── -->
<nav style="background:rgba(15,23,42,0.95);border-bottom:1px solid var(--c-border);position:sticky;top:0;z-index:40;backdrop-filter:blur(8px)">
  <div style="max-width:1200px;margin:0 auto;padding:0 1.5rem;height:3.5rem;display:flex;align-items:center;gap:1rem">
    <a href="/" class="btn-ghost" style="text-decoration:none">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Back to app
    </a>
    <span style="color:var(--c-border)">|</span>
    <span style="font-weight:600;font-size:0.95rem">⚙️ Admin</span>
    <div style="flex:1"></div>
    <template x-if="authed">
      <button @click="logout()" class="btn-ghost">Logout</button>
    </template>
  </div>
</nav>

<!-- ── LOGIN ── -->
<template x-if="!authed">
  <div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 3.5rem);padding:2rem">
    <div class="card" style="width:100%;max-width:360px">
      <h1 style="font-size:1.1rem;font-weight:600;margin:0 0 0.25rem">Admin access</h1>
      <p style="color:var(--c-muted);font-size:0.85rem;margin:0 0 1.5rem">Enter the admin password to continue.</p>
      <form @submit.prevent="login()">
        <input
          x-model="password" type="password" placeholder="Password" autofocus
          style="width:100%;background:#0f172a;color:var(--c-text);border:1px solid var(--c-border);
                 border-radius:0.75rem;padding:0.6rem 0.9rem;font-size:0.9rem;outline:none;
                 box-sizing:border-box;margin-bottom:0.75rem;transition:border-color 0.15s"
          @focus="$el.style.borderColor='#6366f1'" @blur="$el.style.borderColor='var(--c-border)'"
        />
        <template x-if="error">
          <p style="color:#f87171;font-size:0.8rem;margin:0 0 0.75rem" x-text="error"></p>
        </template>
        <button type="submit" class="btn-primary" style="width:100%;justify-content:center" :disabled="loading">
          <template x-if="loading"><span class="spinner">⟳</span></template>
          <span x-text="loading ? 'Checking…' : 'Sign in'"></span>
        </button>
      </form>
    </div>
  </div>
</template>

<!-- ── EDITOR ── -->
<template x-if="authed">
  <div style="max-width:1200px;margin:0 auto;padding:2rem 1.5rem;display:grid;grid-template-columns:1fr 280px;gap:1.5rem;align-items:start">

    <!-- Left: editor -->
    <div>
      <!-- Header row -->
      <div style="margin-bottom:0.75rem">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem">
          <h2 style="font-size:1rem;font-weight:600;margin:0">Update Repo List</h2>
          <!-- List / Raw toggle -->
          <div style="display:flex;border:1px solid var(--c-border);border-radius:0.5rem;overflow:hidden">
            <button class="tab-btn" :class="{ active: viewMode === 'list' }" @click="viewMode='list'">List</button>
            <button class="tab-btn" :class="{ active: viewMode === 'raw' }"  @click="viewMode='raw'">Raw</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:0.75rem">
          <span style="font-size:0.75rem;color:var(--c-muted)" x-text="`${lineCount} repos`"></span>
          <template x-if="duplicateCount > 0">
            <span style="font-size:0.75rem;color:#f87171"
                  x-text="`⚠ ${duplicateCount} duplicate${duplicateCount > 1 ? 's' : ''}`"></span>
          </template>
          <span x-show="dirty" style="font-size:0.75rem;color:#f59e0b">● unsaved</span>
        </div>
      </div>

      <!-- List view -->
      <div x-show="viewMode === 'list'">
        <div class="entry-list">
          <template x-for="(entry, i) in parsedLines" :key="i">
            <div class="entry-row" :class="{ dup: entry.isDup, comment: entry.isComment }">
              <!-- Dot indicator -->
              <span class="entry-dot"
                    :style="entry.isDup ? 'background:#ef4444' : entry.isComment ? 'background:#475569' : 'background:#334155'"></span>
              <!-- Text -->
              <span class="entry-text" x-text="entry.text"></span>
              <!-- Dup badge -->
              <template x-if="entry.isDup">
                <span class="dup-badge">duplicate</span>
              </template>
              <!-- Remove button -->
              <button class="entry-remove" @click="removeLine(entry.rawIndex)" title="Remove">×</button>
            </div>
          </template>

          <!-- Add new entry -->
          <div class="add-row">
            <span style="color:#475569;font-size:0.8rem;flex-shrink:0">+</span>
            <input class="add-input" x-ref="addInput" placeholder="owner/repo"
                   @keydown.enter.prevent="addEntry($el.value); $el.value = ''" />
            <button class="btn-ghost" style="padding:0.3rem 0.75rem;font-size:0.75rem"
                    @click="addEntry($refs.addInput.value); $refs.addInput.value = ''">Add</button>
          </div>
        </div>
        <p style="font-size:0.75rem;color:var(--c-muted);margin-top:0.5rem">
          Press <kbd style="background:var(--c-card);border:1px solid var(--c-border);border-radius:4px;padding:0.1rem 0.35rem;font-size:0.7rem">Enter</kbd> in the add field to append. Switch to Raw for bulk edits.
        </p>
      </div>

      <!-- Raw view -->
      <div x-show="viewMode === 'raw'">
        <textarea class="raw-textarea" x-model="content" @input="dirty = true" rows="28" spellcheck="false"
                  placeholder="One owner/repo per line, e.g.:&#10;openai/openai-python&#10;# comment lines are ignored"></textarea>
        <p style="font-size:0.75rem;color:var(--c-muted);margin-top:0.5rem">
          One <code style="color:#a5b4fc">owner/repo</code> per line. Lines starting with <code style="color:#a5b4fc">#</code> are ignored.
        </p>
      </div>
    </div>

    <!-- Right: actions + backups -->
    <div style="display:flex;flex-direction:column;gap:1rem;position:sticky;top:5rem">

      <!-- Save card -->
      <div class="card">
        <button @click="save()" class="btn-primary" style="width:100%;justify-content:center" :disabled="saving">
          <template x-if="saving"><span class="spinner">⟳</span></template>
          <template x-if="!saving">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
            </svg>
          </template>
          <span x-text="saving ? 'Saving…' : 'Save & Refresh'"></span>
        </button>
        <template x-if="status">
          <div :style="status.ok
                ? 'margin-top:0.75rem;padding:0.6rem 0.75rem;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:0.5rem;font-size:0.8rem;color:#86efac'
                : 'margin-top:0.75rem;padding:0.6rem 0.75rem;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:0.5rem;font-size:0.8rem;color:#fca5a5'"
               x-text="status.msg"></div>
        </template>
      </div>

      <!-- Git Sync card -->
      <div class="card">
        <h3 style="font-size:0.85rem;font-weight:600;margin:0 0 0.75rem;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.05em">Git Sync</h3>

        <!-- Loading state -->
        <template x-if="gitStatus === null">
          <p style="font-size:0.8rem;color:var(--c-muted)"><span class="spinner">⟳</span> Checking…</p>
        </template>

        <template x-if="gitStatus !== null">
          <div>
            <!-- Pending files -->
            <template x-if="gitStatus.pending">
              <div>
                <span class="git-badge git-badge-pending">
                  ● <span x-text="`${gitStatus.count} file${gitStatus.count > 1 ? 's' : ''} pending`"></span>
                </span>
                <div class="git-file-list">
                  <template x-for="f in gitStatus.files" :key="f">
                    <div class="git-file-item">
                      <span class="git-status-char" x-text="f.slice(0,2).trim() || 'M'"></span>
                      <span x-text="f.slice(3)"></span>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- Up to date (no pending, no open PR) -->
            <template x-if="!gitStatus.pending && !gitStatus.pr">
              <span class="git-badge git-badge-ok">✓ Up to date</span>
            </template>

            <!-- PR status -->
            <template x-if="gitStatus.pr">
              <div style="margin-top:0.5rem">
                <!-- PR merged -->
                <template x-if="gitStatus.pr.merged">
                  <span class="git-badge git-badge-merged">
                    ✓ PR #<span x-text="gitStatus.pr.number"></span> merged to main
                  </span>
                </template>
                <!-- PR open -->
                <template x-if="!gitStatus.pr.merged">
                  <a :href="gitStatus.pr.url" target="_blank" rel="noopener"
                     class="git-badge git-badge-open" style="text-decoration:none;display:inline-flex">
                    ↗ PR #<span x-text="gitStatus.pr.number"></span>
                    <span style="color:var(--c-muted)">open — awaiting merge</span>
                  </a>
                </template>
              </div>
            </template>

            <!-- Sync button (disabled while PR is open) -->
            <div style="margin-top:0.75rem">
              <button @click="syncToGit()"
                      class="btn-primary"
                      style="width:100%;justify-content:center;font-size:0.82rem;padding:0.45rem 1rem"
                      :disabled="gitSyncing || (gitStatus.pr && !gitStatus.pr.merged) || !gitStatus.pending">
                <template x-if="gitSyncing"><span class="spinner">⟳</span></template>
                <template x-if="!gitSyncing">
                  <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                  </svg>
                </template>
                <span x-text="gitSyncing ? 'Opening PR…' : (gitStatus.pr && !gitStatus.pr.merged) ? 'PR pending merge' : 'Sync to Git'"></span>
              </button>
              <template x-if="gitError">
                <p style="margin-top:0.5rem;font-size:0.75rem;color:#fca5a5" x-text="gitError"></p>
              </template>
            </div>
          </div>
        </template>
      </div>

      <!-- Backups card -->
      <div class="card">
        <h3 style="font-size:0.85rem;font-weight:600;margin:0 0 0.75rem;color:var(--c-muted);text-transform:uppercase;letter-spacing:0.05em">Backups</h3>
        <template x-if="backups.length === 0">
          <p style="font-size:0.8rem;color:var(--c-muted)">No backups yet.</p>
        </template>
        <div style="display:flex;flex-direction:column;gap:0.4rem;max-height:320px;overflow-y:auto">
          <template x-for="b in backups" :key="b.name">
            <div style="display:flex;justify-content:space-between;align-items:baseline;gap:0.5rem;padding:0.35rem 0;border-bottom:1px solid var(--c-border)">
              <span style="font-family:monospace;font-size:0.75rem;color:#a5b4fc"
                    x-text="b.name.replace('repos_','').replace('.txt','')"></span>
              <span style="font-size:0.7rem;color:var(--c-muted);white-space:nowrap"
                    x-text="`${(b.size/1024).toFixed(1)} KB`"></span>
            </div>
          </template>
        </div>
      </div>

    </div>
  </div>
</template>

<script>
function admin() {
  return {
    password: '',
    authed: false,
    loading: false,
    error: '',
    content: '',
    dirty: false,
    saving: false,
    status: null,
    backups: [],
    viewMode: 'list', // 'list' | 'raw'
    gitStatus: null,   // { pending, count, files, pr }
    gitSyncing: false,
    gitError: '',

    get lineCount() {
      return this.content.split('\n').filter(l => {
        const t = l.trim(); return t && !t.startsWith('#');
      }).length;
    },

    get _dupSet() {
      const seen = new Map();
      this.content.split('\n').forEach(line => {
        const k = line.trim().toLowerCase();
        if (k && !k.startsWith('#')) seen.set(k, (seen.get(k) || 0) + 1);
      });
      const dups = new Set();
      seen.forEach((n, k) => { if (n > 1) dups.add(k); });
      return dups;
    },

    get duplicateCount() {
      return this._dupSet.size;
    },

    get parsedLines() {
      const dups = this._dupSet;
      return this.content.split('\n').map((line, rawIndex) => {
        const text = line.trim();
        const isComment = text.startsWith('#');
        const isEmpty = !text;
        const isDup = !isComment && !isEmpty && dups.has(text.toLowerCase());
        return { text: text || '', rawIndex, isComment, isEmpty, isDup };
      }).filter(e => !e.isEmpty);
    },

    removeLine(rawIndex) {
      const lines = this.content.split('\n');
      lines.splice(rawIndex, 1);
      this.content = lines.join('\n');
      this.dirty = true;
    },

    addEntry(value) {
      value = value.trim();
      if (!value) return;
      this.content = (this.content.trimEnd() ? this.content.trimEnd() + '\n' : '') + value;
      this.dirty = true;
    },

    async init() {
      const stored = sessionStorage.getItem('admin_pw');
      if (stored) { this.password = stored; await this.load(); }
    },

    async login() {
      this.loading = true; this.error = '';
      await this.load();
      this.loading = false;
    },

    async load() {
      try {
        const r = await fetch('/api/admin/repos-txt', {
          headers: { 'x-admin-password': this.password }
        });
        if (r.ok) {
          const d = await r.json();
          this.content = d.content;
          this.authed = true; this.dirty = false;
          sessionStorage.setItem('admin_pw', this.password);
          await this.loadBackups();
          await this.loadGitStatus();
        } else {
          this.error = r.status === 401 ? 'Wrong password.' : 'Server error — check ADMIN_PASSWORD is set.';
          sessionStorage.removeItem('admin_pw');
        }
      } catch { this.error = 'Could not reach server.'; }
    },

    async loadBackups() {
      try {
        const r = await fetch('/api/admin/backups', { headers: { 'x-admin-password': this.password } });
        if (r.ok) this.backups = await r.json();
      } catch {}
    },

    async save() {
      this.saving = true; this.status = null;
      try {
        const r = await fetch('/api/admin/repos-txt', {
          method: 'POST',
          headers: { 'x-admin-password': this.password, 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: this.content }),
        });
        if (r.ok) {
          const d = await r.json();
          this.dirty = false;
          this.status = {
            ok: true,
            msg: `Saved — ${d.repos} repos. ${d.refresh_started ? 'Refresh started.' : 'Refresh already running.'}${d.backup ? ` Backup: ${d.backup}` : ''}`,
          };
          await this.loadBackups();
        } else {
          this.status = { ok: false, msg: 'Save failed. Check server logs.' };
        }
      } catch { this.status = { ok: false, msg: 'Network error.' }; }
      this.saving = false;
    },

    async loadGitStatus() {
      try {
        const r = await fetch('/api/admin/git-status', { headers: { 'x-admin-password': this.password } });
        if (r.ok) this.gitStatus = await r.json();
      } catch { this.gitStatus = { pending: false, count: 0, files: [], pr: null }; }
    },

    async syncToGit() {
      this.gitSyncing = true; this.gitError = '';
      try {
        const r = await fetch('/api/admin/git-sync', {
          method: 'POST',
          headers: { 'x-admin-password': this.password },
        });
        const d = await r.json();
        if (!r.ok) {
          this.gitError = d.detail || 'Sync failed — check server logs.';
        } else if (d.status === 'nothing_to_commit') {
          this.gitError = 'Nothing to commit — data/ is already in sync.';
        }
        // Refresh git status to show the new PR state
        await this.loadGitStatus();
      } catch { this.gitError = 'Network error during sync.'; }
      this.gitSyncing = false;
    },

    logout() {
      sessionStorage.removeItem('admin_pw');
      this.authed = false; this.password = ''; this.content = '';
      this.status = null; this.backups = [];
      this.gitStatus = null; this.gitError = '';
    },
  };
}
